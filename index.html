<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronan Sullivan — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-poster: #bcc6cc; /* Cold, clinical glaucous blue-gray */
    --black: #0d0d0d;
    --pistachio: #93a27f; /* Sickly, institutional green */
    --nosebleed-red: #7c2230; /* Cinematic deep red */
    --font: 'Archivo', sans-serif;
    --ease: cubic-bezier(0.77, 0, 0.175, 1);
    
    /* Dynamic opacity variables controlled via JS */
    --current-opacity: 0.72; 
  }

  body {
    background-color: var(--bg-poster);
    color: var(--black);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* INTENSE FILM GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.5;
    pointer-events: none;
    z-index: 50;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* CANVAS */
  .canvas {
    width: 92vw;
    max-width: 1100px;
    height: 85vh;
    position: relative;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: repeat(12, 1fr);
    background-color: var(--bg-poster);
    overflow: hidden; 
  }

  /* ATMOSPHERIC DUO-TONE BLEED */
  .canvas::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    background: linear-gradient(135deg, var(--pistachio) 0%, transparent 40%, transparent 60%, var(--nosebleed-red) 100%);
    opacity: 0.18;
    mix-blend-mode: multiply;
  }

  /* NON-UNIFORM ANGULAR FLOATING SHARDS */
  .geo-shard {
    position: absolute;
    opacity: var(--current-opacity);
    z-index: 1;
    pointer-events: none;
    transition: opacity 1.2s var(--ease);
  }

  .green-shard { background-color: var(--pistachio); }
  .red-shard { background-color: var(--nosebleed-red); }

  /* Continuous non-uniform rotation and drifting */
  .drift-fast { animation: driftRight 18s linear infinite, spinShard 20s linear infinite; }
  .drift-slow { animation: driftLeft 30s linear infinite, spinShard 35s linear infinite reverse; }

  /* Pure CSS Polygons for highly non-uniform shapes */
  .p1 { 
    width: 120px; height: 100px; top: 10%; left: 5%; 
    clip-path: polygon(20% 0%, 100% 20%, 70% 90%, 0% 80%);
  }
  .p2 { 
    width: 60px; height: 60px; top: 35%; left: 25%; 
    clip-path: polygon(50% 0%, 100% 100%, 0% 60%);
  }
  .p3 { 
    width: 150px; height: 130px; top: 65%; left: 45%; 
    clip-path: polygon(0 0, 100% 30%, 85% 100%, 10% 85%);
  }
  .p4 { 
    width: 40px; height: 50px; top: 75%; left: 80%; 
    clip-path: polygon(10% 10%, 90% 20%, 100% 90%, 20% 100%);
  }
  .p5 { 
    width: 180px; height: 140px; top: 5%; left: 75%; 
    clip-path: polygon(30% 0%, 90% 10%, 100% 70%, 0% 100%);
  }

  @keyframes driftRight {
    0% { transform: translateX(-200px); }
    100% { transform: translateX(calc(92vw + 200px)); }
  }

  @keyframes driftLeft {
    0% { transform: translateX(calc(92vw + 200px)); }
    100% { transform: translateX(-200px); }
  }

  @keyframes spinShard {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* THE PRIMARY SPECIMEN SHAPE */
  .hero-drip-container {
    grid-column: 5 / 9;
    grid-row: 2 / 7;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    animation: floatingPrimary 8s ease-in-out infinite;
  }

  @keyframes floatingPrimary {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(3deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  .hero-drip {
    width: 100%;
    height: 100%;
    background-color: var(--nosebleed-red);
    opacity: var(--current-opacity);
    
    /* 1. SCALE UP TO 170% TO ZOOM IN ON YOU AND CUT OUT BACKGROUND TREES */
    background-size: 170%;
    /* 2. PIN TO THE BOTTOM CENTER TO CAPTURE YOUR FACE AND WATCH */
    background-position: 50% 100%; 
    
    clip-path: polygon(10% 5%, 95% 0%, 85% 90%, 5% 100%);
    transition: transform 1.2s var(--ease), opacity 1.2s var(--ease);
    pointer-events: auto;
    cursor: pointer;
    
    /* 3. HARD DARKS, ZERO BLANCHING */
    filter: 
      grayscale(100%) 
      contrast(340%)    
      sepia(100%)      
      hue-rotate(-52deg) 
      brightness(70%);  
  }

  .hero-drip:hover {
    transform: scale(1.05) rotate(-2deg);
  }

  /* OVERLAY FOR UNSETTLING BLEND */
  .hero-drip::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: var(--pistachio);
    opacity: 0.15;
    mix-blend-mode: color-burn;
  }
  
  .hero-drip::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1;
    background-color: var(--nosebleed-red);
    opacity: 0.22;
    mix-blend-mode: overlay;
  }

  /* TITLES & NAV */
  .masthead {
    grid-column: 1 / 13;
    grid-row: 8 / 13;
    z-index: 30; 
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 20px;
    pointer-events: none; 
  }

  .main-title {
    font-size: 140px;
    font-weight: 900;
    letter-spacing: -10px;
    line-height: 0.75;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 10px;
    transform: scaleY(1.15);
    transform-origin: bottom;
    transition: opacity 0.6s var(--ease);
  }

  .main-nav {
    display: flex;
    gap: 15px; 
    margin-left: -10px; 
  }

  .nav-item {
    font-size: 15px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--black);
    padding: 20px 15px; 
    pointer-events: auto; 
    transition: opacity 0.3s, transform 0.3s var(--ease), color 0.3s;
    display: inline-block;
  }

  .nav-item:hover {
    opacity: 0.8;
    transform: scaleY(1.4) translateY(5px); 
  }

  .nav-item.active-nav {
    color: var(--black);
    text-decoration: underline;
    text-underline-offset: 5px;
    transform: scaleY(1.2);
    pointer-events: none; 
  }

  /* SECTIONS */
  .section-content {
    grid-column: 2 / 12;
    grid-row: 2 / 8;
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s var(--ease);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-content.active {
    opacity: 1;
    pointer-events: auto;
  }

  .section-title {
    font-size: 55px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -3px;
    margin-bottom: 20px;
    transform: scaleY(1.1);
    transform-origin: left;
  }

  /* WRITING GRID */
  .writing-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }

  .category-group {
    border-top: 4px solid var(--black);
    padding-top: 10px;
  }
